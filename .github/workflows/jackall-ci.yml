name: JackAll build and test

on:
  push:
    branches: [main]
    paths:
      - 'tools/JackAll/**'
      - '.github/workflows/jackall-ci.yml'
  pull_request:
    paths:
      - 'tools/JackAll/**'
      - '.github/workflows/jackall-ci.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    # net10.0-windows (JackAll.App, WPF) only builds on Windows.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/JackAll
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore JackAll.slnx

      - name: Build
        run: dotnet build JackAll.slnx --configuration Release --no-restore

      - name: Test
        # Only JackAll.Core.Tests has tests; App/Cli/Core are exercised by the build above.
        # Tests that need a real Far Cry 2 install or the (gitignored) archive fixtures are tagged
        # [Trait("Category", "RequiresFixture")] and excluded here, since this runner has neither -
        # some of them assert outright (rather than silently no-op) when their fixture is missing,
        # specifically to catch a local run silently skipping them.
        run: dotnet test src/JackAll.Core.Tests/JackAll.Core.Tests.csproj --configuration Release --no-build --filter "Category!=RequiresFixture"
