; XxHash3 digest (System.IO.Hashing) of every .dat/.fat archive in a clean Far Cry 2 install
; (Steam, patched to 1.03), relative to Data_Win32. JackAll.Core.VanillaHashes reads this to warn
; when an install's own files don't match what a clean 1.03 game should have - wrong version,
; corrupted download, or already carrying someone else's mod before this tool ever touched it.
;
; Non-cryptographic on purpose: nothing here defends against a deliberate forgery, only against
; corruption/wrong-version/already-modded, which XxHash3 catches just as reliably as a cryptographic
; hash would, at several times the throughput on files running into the hundreds of MB.
;
; patch.dat/patch.fat are included too, but only ever checked right after a "Remove all mods"
; restore (see MainWindow.RestoreVanilla_Click) - the rest of the time patch.dat is expected to
; differ, since it's the one archive this tool itself rewrites on every build.
;
; Regenerate with JackAll.Core.VanillaHashes.ComputeHash against each archive under a verified-clean
; install's Data_Win32, writing "<path relative to Data_Win32> = <hash>" one per line.

